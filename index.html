    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const defaultContent = `**PHIẾU HỌC TẬP TỰ HỌC**
**Tên bài:** PHƯƠNG TRÌNH ĐƯỜNG TRÒN
**Phân loại:** Hình học 10 - Lý thuyết & Bài tập cơ bản
**Đơn vị:** Trường THPT Nguyễn Hữu Cảnh
**Giáo viên:** Thầy Vũ Tiến Lực

**Họ và tên học sinh:** ........................................................... **Lớp:** .......................

---

### **I. KHỞI ĐỘNG: GIẢI CỨU BẢO BỐI CỦA DORAEMON**
Doraemon vừa đánh rơi một chiếc "Vòng xuyên thấu" trên mặt phẳng tọa độ $Oxy$. Chiếc vòng này có tâm nằm tại điểm $I(2; 3)$ và bán kính đúng bằng $5$.

✦ **Thử thách:** Em hãy tìm một điều kiện đại số giữa tọa độ $x, y$ của một điểm $M$ bất kỳ nằm trên chiếc vòng đó. *(Gợi ý: Dùng công thức khoảng cách $IM = R$)*

**Lời giải của em:**
...................................................................................................................................
...................................................................................................................................

### **II. KHÁM PHÁ TRI THỨC**
Em hãy hoàn thành bảng dưới đây để tự xây dựng công thức:

| Bước dẫn dắt | Nội dung thực hiện | Kết quả đúc kết của em |
| :--- | :--- | :--- |
| **1. Tọa độ tâm** | Cho đường tròn $(C)$ tâm $I(a; b)$ và bán kính $R$. Lấy điểm $M(x; y)$ thuộc $(C)$. | Độ dài $IM =$ ........................ |
| **2. Khoảng cách** | Tính bình phương khoảng cách: $IM^2 = R^2$ | $(x - \\dots)^2 + (y - \\dots)^2 =$ ............ |
| **3. Khai triển** | Khai triển hằng đẳng thức từ biểu thức vừa tìm được ở trên. | $x^2 + y^2 - 2ax - 2by + \\dots = 0$ |

===

### **III. CHỐT KIẾN THỨC TRỌNG TÂM (Trang 2)**

> **1. Phương trình chính tắc:**
> Đường tròn $(C)$ tâm $I(a; b)$, bán kính $R$ có phương trình là:
> $$(x - a)^2 + (y - b)^2 = R^2$$
>
> **2. Phương trình tổng quát:**
> Phương trình $x^2 + y^2 - 2ax - 2by + c = 0$ là phương trình đường tròn nếu $a^2 + b^2 - c > 0$.
> Khi đó, đường tròn có tâm $I(a; b)$ và bán kính $R = \\sqrt{a^2 + b^2 - c}$.

### **IV. LUYỆN TẬP VÀ VẬN DỤNG**

✦ **Mức độ Nhận biết**
➢ Xác định tâm và bán kính của đường tròn $(C): (x + 1)^2 + (y - 4)^2 = 16$.
...................................................................................................................................

➢ Trong các phương trình sau, đâu là PT đường tròn: a) $x^2 + y^2 - 2x + 4y + 20 = 0$
...................................................................................................................................

✦ **Mức độ Thông hiểu**
➢ Viết phương trình đường tròn tâm $A(1; -2)$ và đi qua điểm $B(4; 2)$.
...................................................................................................................................

✦ **Mức độ Vận dụng (Thử thách Conan)**
➢ Cho đường thẳng $\\Delta: 3x - 4y + 5 = 0$. Viết PT đường tròn tâm $I(2; 1)$ và tiếp xúc $\\Delta$.
...................................................................................................................................
...................................................................................................................................

### **V. TỰ ĐÁNH GIÁ**
* [ ] 😄 **Cười tươi:** Em đã hiểu bài và tự làm được bài tập.
* [ ] 😟 **Nhăn nhó:** Thầy giảng lại giúp em phần: .................................................................`;

        const App = () => {
            const [markdown, setMarkdown] = useState(defaultContent);
            const [theme, setTheme] = useState('theme-creative');
            const [fontFamily, setFontFamily] = useState("'Times New Roman', Times, serif");
            const [fontSize, setFontSize] = useState(12);
            // State Zoom mới: Mặc định thu nhỏ 75% để vừa vặn màn hình
            const [zoom, setZoom] = useState(0.75); 
            
            const [showPromptModal, setShowPromptModal] = useState(false);
            const [pSubject, setPSubject] = useState('Toán');
            const [pGrade, setPGrade] = useState('10');
            const [pTopic, setPTopic] = useState('Phương trình đường tròn');
            const [pExtra, setPExtra] = useState('');
            const [copySuccess, setCopySuccess] = useState(false);

            const previewRef = useRef(null);

            // Hàm xử lý cắt trang và render Markdown
            const processMarkdownPage = (mdContent) => {
                let html = marked.parse(mdContent);
                // Tạo các dòng chấm tự động
                html = html.replace(/\.{15,}/g, '<span class="dotted-line"></span>');
                return { __html: html };
            };

            // Tách nội dung thành mảng các trang dựa trên ký hiệu ===
            const pages = markdown.split(/^===$/gm);

            // Hook render Toán học chạy trên toàn bộ wrapper chứa các trang
            useEffect(() => {
                if (previewRef.current) {
                    renderMathInElement(previewRef.current, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false
                    });
                }
            }, [markdown, theme, fontFamily, fontSize, zoom]); 

            // Prompt tự động sinh ra
            const generatedPrompt = `Hãy đóng vai một giáo viên ${pSubject} xuất sắc và giàu kinh nghiệm. Bạn hãy soạn một "Phiếu học tập tự học" dành cho học sinh lớp ${pGrade} về chủ đề: "${pTopic}".

YÊU CẦU ĐỊNH DẠNG BẮT BUỘC:
1. Dùng chuẩn Markdown.
2. Công thức toán học BẮT BUỘC đặt trong dấu $ (inline) hoặc $$ (block) theo chuẩn LaTeX. Không dùng mã Unicode.
3. Chỗ nào cần không gian cho học sinh điền/viết tự luận, hãy gõ đúng 15 dấu chấm liên tiếp "..............." (hệ thống sẽ tự động vẽ dòng kẻ đứt khúc).
4. Quan trọng: Hãy tính toán độ dài. Nếu dài hơn 1 trang A4, BẮT BUỘC sử dụng 3 dấu bằng "===" trên một dòng riêng biệt để cắt sang trang giấy mới.
5. Cấu trúc phiếu gợi ý:
   - Phần đầu: Tên bài, Họ tên, Lớp.
   - I. Khởi động (Tình huống thực tế).
   - II. Khám phá (Bảng step-by-step).
   - III. Chốt kiến thức.
   - IV. Luyện tập.
   - V. Tự đánh giá.${pExtra ? `\n\nYÊU CẦU ĐẶC BIỆT THÊM:\n${pExtra}` : ''}

Lưu ý: Chỉ trả về nội dung Markdown.`;

            const handleCopyPrompt = () => {
                const textArea = document.createElement("textarea");
                textArea.value = generatedPrompt;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 3000);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            return (
                <div class="flex flex-col h-full w-full">
                    {/* Header bar */}
                    <header class="bg-indigo-700 text-white p-3 shadow-md no-print flex justify-between items-center z-20 shrink-0">
                        <div class="flex items-center gap-2">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            <h1 class="text-lg font-bold">Trình Tạo Phiếu Học Tập A4</h1>
                        </div>
                        
                        <div class="flex gap-3 items-center flex-wrap justify-end">
                            <button 
                                onClick={() => setShowPromptModal(true)}
                                class="bg-blue-500 hover:bg-blue-400 text-white px-3 py-1 rounded text-sm font-bold flex items-center gap-1 shadow transition"
                            >
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                AI Prompt

                            {/* Zoom Control */}
                            <div class="flex items-center gap-1 bg-indigo-600 px-2 py-1 rounded border border-indigo-500">

                                    <option value="'Be Vietnam Pro', sans-serif" class="text-black">Be Vietnam Pro</option>
                                    <option value="'Nunito', sans-serif" class="text-black">Nunito</option>
                                </select>
                            </div>

                            <div class="flex items-center gap-1 bg-indigo-600 px-2 py-1 rounded">
                                <label class="text-xs font-semibold text-indigo-100">Style:</label>
                                <select 
                                    class="bg-transparent text-white text-sm border-none outline-none cursor-pointer"

                                    <option value="theme-competency" class="text-black">Năng lực</option>
                                </select>
                            </div>

                            <div class="flex items-center gap-1 bg-indigo-600 px-2 py-1 rounded">
                                <label class="text-xs font-semibold text-indigo-100" title="Kích thước chữ">Cỡ chữ:</label>
                                <div class="flex items-center gap-1">
                                    <button onClick={() => setFontSize(Math.max(8, fontSize - 1))} class="text-white hover:text-yellow-300 font-bold px-1">-</button>

                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                                Xem / In PDF
                            </button>
                        </div>
                    </header>

                    {/* Main Workspace */}

                        {/* Editor Sidebar */}
                        <div class="w-1/2 p-4 flex flex-col border-r border-gray-300 bg-white no-print shrink-0 z-10 shadow-lg relative">

                                    <span class="bg-red-50 text-red-600 px-1 rounded border border-red-200 font-bold" title="Gõ 3 dấu bằng để sang trang PDF mới">Ngắt trang mới: ===</span>
                                </div>
                            </div>
                            <textarea 
                                class="flex-1 w-full p-4 border border-gray-200 rounded-md font-mono text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50"
                                value={markdown}
                                onChange={(e) => setMarkdown(e.target.value)}
                                spellcheck="false"
                            ></textarea>
                        </div>

                        {/* Preview Area - Vùng chứa các trang giấy */}
                        <div class="w-1/2 bg-[#525659] overflow-y-auto flex flex-col items-center py-8 print-area-wrapper relative">
                            
                            {/* Wrapper hỗ trợ Zoom thu nhỏ trang giấy trên màn hình */}
                            <div 
                                class="zoom-wrapper flex flex-col items-center gap-8" 
                                style={{ transform: `scale(${zoom})`, transformOrigin: 'top center' }}
                                ref={previewRef}
                            >
                                {pages.map((pageContent, index) => (
                                    <div 
                                        key={index}
                                        class="bg-white w-[210mm] min-h-[297mm] shadow-2xl print-paper relative shrink-0"
                                    >
                                        <div 
                                            class={`markdown-body ${theme} p-[15mm] h-full`} 
                                            style={{ fontFamily: fontFamily, fontSize: fontSize + 'px' }}
                                            dangerouslySetInnerHTML={processMarkdownPage(pageContent)} 
                                        />
                                        {/* Đánh dấu số trang (Chỉ hiển thị trên màn hình, không in) */}
                                        <div class="absolute bottom-4 right-4 text-gray-400 text-xs no-print select-none">
                                            - Trang {index + 1} -
                                        </div>
                                    </div>
                                ))}
                            </div>

                        </div>
                    </main>

                    {/* Modal Prompt Generator */}
                    {showPromptModal && (
                        <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 no-print">
                            <div class="bg-white rounded-lg shadow-xl w-full max-w-3xl flex flex-col max-h-[90vh] mx-4">
                                <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-indigo-50 rounded-t-lg">
                                    <h3 class="text-lg font-bold text-indigo-800 flex items-center gap-2">🤖 Trợ Lý Soạn Lệnh AI</h3>
                                    <button onClick={() => setShowPromptModal(false)} class="text-gray-500 hover:text-red-500 font-bold text-2xl">&times;</button>
                                </div>
                                
                                <div class="p-6 overflow-y-auto flex-1 flex flex-col gap-4">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div><label class="block text-sm font-semibold mb-1">Môn học</label><input type="text" value={pSubject} onChange={e => setPSubject(e.target.value)} class="w-full border rounded p-2 text-sm"/></div>
                                        <div><label class="block text-sm font-semibold mb-1">Khối Lớp</label><input type="text" value={pGrade} onChange={e => setPGrade(e.target.value)} class="w-full border rounded p-2 text-sm"/></div>
                                    </div>
                                    <div><label class="block text-sm font-semibold mb-1">Tên bài học</label><input type="text" value={pTopic} onChange={e => setPTopic(e.target.value)} class="w-full border rounded p-2 text-sm"/></div>
                                    <div><label class="block text-sm font-semibold mb-1">Yêu cầu đặc biệt (Nếu có)</label><textarea value={pExtra} onChange={e => setPExtra(e.target.value)} class="w-full border rounded p-2 text-sm h-16"></textarea></div>
                                    <div>
                                        <label class="block text-sm font-semibold text-indigo-700 mb-1">COPY ĐOẠN NÀY GỬI CHO AI:</label>
                                        <textarea readOnly value={generatedPrompt} class="w-full bg-gray-50 border-2 border-dashed border-indigo-300 rounded p-3 text-xs font-mono text-gray-700 h-32 focus:outline-none"></textarea>
                                    </div>
                                </div>
                                
                                <div class="px-6 py-4 border-t flex justify-end gap-3 bg-gray-50 rounded-b-lg">
                                    <button onClick={() => setShowPromptModal(false)} class="px-5 py-2 border rounded hover:bg-gray-200">Đóng</button>
                                    <button onClick={handleCopyPrompt} class="px-5 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 font-bold flex items-center gap-2">
                                        {copySuccess ? "✔ Đã Copy!" : "Copy Prompt"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
