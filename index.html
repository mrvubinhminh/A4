<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ thiết kế Phiếu Học Tập Tích Cực</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts cho Tiếng Việt -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Merriweather:wght@400;700&family=Nunito:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;600;700&family=Roboto:wght@400;500;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Marked (Markdown Parser) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- KaTeX for Math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        /* CSS tuỳ chỉnh cho bản in chuyên nghiệp */
        @media print {
            body { background: white !important; margin: 0 !important; padding: 0 !important; }
            .no-print { display: none !important; }
            
            /* Cấu hình lề A4 chuẩn 20mm */
            @page { 
                size: A4; 
                margin: 20mm; /* Lề chuẩn chuyên nghiệp */
            }

            .print-area-wrapper { 
                background: none !important; 
                padding: 0 !important; 
                overflow: visible !important; 
                height: auto !important; 
                display: block !important;
            }
            
            .zoom-wrapper { 
                transform: none !important; 
                width: 100% !important; 
                display: block !important; 
                margin: 0 !important; 
                padding: 0 !important; 
            }
            
            .print-paper { 
                width: 100% !important; 
                max-width: none !important; 
                box-shadow: none !important; 
                margin: 0 !important; 
                padding: 0 !important; 
                page-break-after: always; 
                min-height: auto !important;
                background: white !important;
            }

            .markdown-body {
                padding: 0 !important; /* Lề do @page margin 20mm kiểm soát */
            }
        }

        /* Định dạng chung cho Preview */
        .markdown-body h1 { font-size: 1.5rem; font-weight: bold; text-align: center; text-transform: uppercase; margin-bottom: 1rem; color: #111; }
        .markdown-body h3 { font-size: 1.1rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; }
        
        /* Cấu hình bảng */
        .markdown-body table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 1.5rem; 
            table-layout: auto;
        }
        .markdown-body th, .markdown-body td { 
            border: 1px solid #000; 
            padding: 10px 14px; 
            vertical-align: middle;
            word-break: normal;
        }
        
        /* Không ngắt dòng cột tiêu đề */
        .markdown-body table tr th:first-child,
        .markdown-body table tr td:first-child {
            white-space: nowrap !important;
            width: 1%;
            background-color: #f8fafc;
            font-weight: bold;
        }

        /* Giữ công thức toán trên 1 dòng */
        .markdown-body td .katex-display,
        .markdown-body td .katex {
            white-space: nowrap;
        }

        .markdown-body blockquote { background-color: #f3f4f6; border-left: 4px solid #3b82f6; padding: 1rem; margin: 1rem 0; font-style: normal; border-radius: 0.25rem; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body hr { margin: 1.5rem 0; border-top: 2px dashed #e5e7eb; }

        /* Themes */
        .theme-creative.markdown-body h1 { color: #1e40af; border-bottom: 3px double #1e40af; padding-bottom: 4px; }
        .theme-creative.markdown-body h3 { color: #b45309; border-bottom: 2px solid #fbbf24; padding-bottom: 2px; display: inline-block; }
        
        .theme-standard.markdown-body { color: #111827; }
        .theme-standard.markdown-body h1 { border-bottom: 2px solid #000; padding-bottom: 5px; }

        .theme-minimalist.markdown-body { color: #000; }
        .theme-minimalist.markdown-body h1 { border-bottom: 2px solid #000; text-align: center; }
        .theme-minimalist.markdown-body table tr td:first-child { background: none; }

        /* Dòng kẻ chấm */
        .dotted-line {
            border-bottom: 1px dotted #64748b;
            display: block;
            height: 28px;
            margin-bottom: 10px;
            width: 100%;
        }

        .print-area-wrapper::-webkit-scrollbar { width: 10px; }
        .print-area-wrapper::-webkit-scrollbar-track { background: #cbd5e1; }
        .print-area-wrapper::-webkit-scrollbar-thumb { background: #64748b; border-radius: 5px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 flex flex-col h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const defaultContent = `**PHIẾU HỌC TẬP TỰ HỌC**
**Tên bài:** PHƯƠNG TRÌNH ĐƯỜNG TRÒN
**Phân loại:** Hình học 10 - Lý thuyết & Bài tập cơ bản
**Đơn vị:** Trường THPT Nguyễn Hữu Cảnh
**Giáo viên:** Thầy Vũ Tiến Lực

**Họ và tên học sinh:** ........................................................... **Lớp:** .......................

---

### **I. KHỞI ĐỘNG: GIẢI CỨU BẢO BỐI CỦA DORAEMON**
Doraemon vừa đánh rơi một chiếc "Vòng xuyên thấu" trên mặt phẳng tọa độ $Oxy$. Chiếc vòng này có tâm nằm tại điểm $I(2; 3)$ và bán kính đúng bằng $5$.

✦ **Thử thách:** Em hãy tìm một điều kiện đại số giữa tọa độ $x, y$ của một điểm $M$ bất kỳ nằm trên chiếc vòng đó. *(Gợi ý: Dùng công thức khoảng cách $IM = R$)*

**Lời giải của em:**
...................................................................................................................................
...................................................................................................................................

### **II. KHÁM PHÁ TRI THỨC**
Em hãy hoàn thành bảng dưới đây để tự xây dựng công thức:

| Bước dẫn dắt | Nội dung thực hiện | Kết quả đúc kết của em |
| :--- | :--- | :--- |
| **1. Tọa độ tâm** | Cho đường tròn $(C)$ tâm $I(a; b)$ và bán kính $R$. Lấy điểm $M(x; y) \in (C)$. | Độ dài $IM =$ ........................ |
| **2. Khoảng cách** | Tính bình phương khoảng cách: $IM^2 = R^2$ | $(x-a)^2 + (y-b)^2 =$ ............ |
| **3. Khai triển** | Khai triển hằng đẳng thức từ biểu thức vừa tìm được ở trên. | $x^2 + y^2 - 2ax - 2by + c = 0$ |

===

### **III. CHỐT KIẾN THỨC TRỌNG TÂM (Trang 2)**

> **1. Phương trình chính tắc:**
> Đường tròn $(C)$ tâm $I(a; b)$, bán kính $R$ có phương trình là:
> $$(x - a)^2 + (y - b)^2 = R^2$$
>
> **2. Phương trình tổng quát:**
> Phương trình $x^2 + y^2 - 2ax - 2by + c = 0$ là phương trình đường tròn nếu $a^2 + b^2 - c > 0$.
> Khi đó, đường tròn có tâm $I(a; b)$ và bán kính $R = \\sqrt{a^2 + b^2 - c}$.

### **IV. LUYỆN TẬP VÀ VẬN DỤNG**

✦ **Mức độ Nhận biết**
➢ Xác định tâm và bán kính của đường tròn $(C): (x + 1)^2 + (y - 4)^2 = 16$.
...................................................................................................................................

➢ Trong các phương trình sau, đâu là PT đường tròn: a) $x^2 + y^2 - 2x + 4y + 20 = 0$
...................................................................................................................................

✦ **Mức độ Thông hiểu**
➢ Viết phương trình đường tròn tâm $A(1; -2)$ và đi qua điểm $B(4; 2)$.
...................................................................................................................................

✦ **Mức độ Vận dụng (Thử thách Conan)**
➢ Cho đường thẳng $\\Delta: 3x - 4y + 5 = 0$. Viết PT đường tròn tâm $I(2; 1)$ và tiếp xúc $\\Delta$.
...................................................................................................................................

### **V. TỰ ĐÁNH GIÁ**
* [ ] 😄 **Cười tươi:** Em đã hiểu bài và tự làm được bài tập.
* [ ] 😟 **Nhăn nhó:** Thầy giảng lại giúp em phần: .................................................................`;

        const App = () => {
            const [markdown, setMarkdown] = useState(defaultContent);
            const [theme, setTheme] = useState('theme-creative');
            const [fontFamily, setFontFamily] = useState("'Times New Roman', Times, serif");
            const [fontSize, setFontSize] = useState(12);
            const [zoom, setZoom] = useState(0.70); 
            
            const [showPromptModal, setShowPromptModal] = useState(false);
            const [pSubject, setPSubject] = useState('Toán');
            const [pGrade, setPGrade] = useState('10');
            const [pTopic, setPTopic] = useState('Phương trình đường tròn');
            const [copySuccess, setCopySuccess] = useState(false);

            const previewRef = useRef(null);

            const processMarkdownPage = (mdContent) => {
                let html = marked.parse(mdContent);
                html = html.replace(/\.{15,}/g, '<span class="dotted-line"></span>');
                return { __html: html };
            };

            const pages = markdown.split(/^===$/gm);

            useEffect(() => {
                if (previewRef.current) {
                    renderMathInElement(previewRef.current, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError: false
                    });
                }
            }, [markdown, theme, fontFamily, fontSize, zoom]); 

            const generatedPrompt = `Hãy đóng vai một giáo viên ${pSubject} xuất sắc. Bạn hãy soạn một "Phiếu học tập tự học" dành cho học sinh lớp ${pGrade} về chủ đề: "${pTopic}".

YÊU CẦU:
1. Dùng chuẩn Markdown.
2. Công thức toán học đặt trong dấu $ hoặc $$.
3. Dùng 15 dấu chấm "..............." để tạo dòng kẻ.
4. Dùng "===" để ngắt trang.`;

            const handleCopyPrompt = () => {
                navigator.clipboard.writeText(generatedPrompt).then(() => {
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 3000);
                });
            };

            return (
                <div class="flex flex-col h-full w-full">
                    {/* Header bar */}
                    <header class="bg-indigo-700 text-white p-3 shadow-md no-print flex justify-between items-center z-20 shrink-0">
                        <div class="flex items-center gap-2">
                            <h1 class="text-lg font-bold">Trình Tạo Phiếu Học Tập A4</h1>
                        </div>
                        
                        <div class="flex gap-3 items-center flex-wrap justify-end">
                            <button onClick={() => setShowPromptModal(true)} class="bg-blue-500 text-white px-3 py-1 rounded text-xs font-bold shadow-sm">AI Prompt</button>

                            <div class="flex items-center gap-1 bg-indigo-600 px-2 py-1 rounded">
                                <label class="text-xs font-semibold">Xem thử:</label>
                                <div class="flex items-center gap-1">
                                    <button onClick={() => setZoom(Math.max(0.3, zoom - 0.05))} class="text-white font-bold px-1 text-xs">-</button>
                                    <span class="text-white text-xs w-8 text-center">{Math.round(zoom * 100)}%</span>
                                    <button onClick={() => setZoom(Math.min(1.2, zoom + 0.05))} class="text-white font-bold px-1 text-xs">+</button>
                                </div>
                            </div>

                            <select class="bg-indigo-600 text-white text-xs px-2 py-1 rounded outline-none" value={fontFamily} onChange={(e) => setFontFamily(e.target.value)}>
                                <option value="'Times New Roman', Times, serif">Times New Roman</option>
                                <option value="'Be Vietnam Pro', sans-serif">Be Vietnam Pro</option>
                                <option value="'Roboto', sans-serif">Roboto</option>
                            </select>

                            <select class="bg-indigo-600 text-white text-xs px-2 py-1 rounded outline-none" value={theme} onChange={(e) => setTheme(e.target.value)}>
                                <option value="theme-standard">Chuẩn mực</option>
                                <option value="theme-creative">Sáng tạo</option>
                                <option value="theme-minimalist">Tối giản (Tiết kiệm)</option>
                                <option value="theme-competency">Năng lực</option>
                            </select>

                            <div class="flex items-center gap-1 bg-indigo-600 px-2 py-1 rounded">
                                <label class="text-xs font-semibold">Cỡ chữ:</label>
                                <button onClick={() => setFontSize(Math.max(8, fontSize - 1))} class="text-white font-bold px-1 text-xs">-</button>
                                <span class="text-white text-xs w-4 text-center font-bold">{fontSize}</span>
                                <button onClick={() => setFontSize(Math.min(14, fontSize + 1))} class="text-white font-bold px-1 text-xs">+</button>
                            </div>

                            <button onClick={() => window.print()} class="bg-green-600 hover:bg-green-500 text-white px-5 py-1.5 rounded text-sm font-bold shadow-md transition-all ml-2">Xuất / In PDF</button>
                        </div>
                    </header>

                    {/* Main Workspace */}
                    <main class="flex flex-1 overflow-hidden">
                        <div class="w-1/2 p-4 flex flex-col border-r bg-white no-print shrink-0 z-10 shadow-lg">
                            <div class="mb-2 text-xs font-bold text-gray-500 uppercase tracking-wider">Trình soạn thảo</div>
                            <textarea 
                                class="flex-1 w-full p-4 border rounded-md font-mono text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-slate-50 leading-relaxed shadow-inner"
                                value={markdown}
                                onChange={(e) => setMarkdown(e.target.value)}
                                spellcheck="false"
                            ></textarea>
                        </div>

                        <div class="w-1/2 bg-gray-600 overflow-y-auto flex flex-col items-center py-10 print-area-wrapper relative">
                            <div 
                                class="zoom-wrapper flex flex-col items-center gap-10" 
                                style={{ transform: `scale(${zoom})`, transformOrigin: 'top center' }}
                                ref={previewRef}
                            >
                                {pages.map((pageContent, index) => (
                                    <div key={index} class="bg-white w-[210mm] min-h-[297mm] shadow-2xl print-paper relative shrink-0">
                                        <div 
                                            class={`markdown-body ${theme} p-[20mm] h-full`} 
                                            style={{ fontFamily: fontFamily, fontSize: fontSize + 'px' }}
                                            dangerouslySetInnerHTML={processMarkdownPage(pageContent)} 
                                        />
                                        <div class="absolute bottom-6 right-8 text-gray-400 text-xs no-print font-sans">Mô phỏng A4 - Trang {index + 1}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* Modal Prompt Generator */}
                    {showPromptModal && (
                        <div class="fixed inset-0 bg-black/60 flex items-center justify-center z-50 no-print p-4 backdrop-blur-sm">
                            <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-7 flex flex-col gap-4 border border-indigo-100">
                                <h3 class="text-xl font-bold text-indigo-900 border-b pb-2">🤖 Trợ Lý Soạn Lệnh AI</h3>
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="flex flex-col gap-1">
                                        <label class="text-[10px] font-bold text-gray-400 uppercase">Môn học</label>
                                        <input type="text" value={pSubject} onChange={e => setPSubject(e.target.value)} class="border rounded p-2 text-sm focus:ring-1 ring-indigo-500 outline-none"/>
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <label class="text-[10px] font-bold text-gray-400 uppercase">Khối lớp</label>
                                        <input type="text" value={pGrade} onChange={e => setPGrade(e.target.value)} class="border rounded p-2 text-sm focus:ring-1 ring-indigo-500 outline-none"/>
                                    </div>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Tên bài học</label>
                                    <input type="text" value={pTopic} onChange={e => setPTopic(e.target.value)} class="border rounded p-2 text-sm focus:ring-1 ring-indigo-500 outline-none"/>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <label class="text-[10px] font-bold text-gray-400 uppercase">Kết quả Prompt</label>
                                    <textarea readOnly value={generatedPrompt} class="w-full bg-gray-50 border border-dashed rounded p-3 text-xs font-mono h-32 focus:outline-none"></textarea>
                                </div>
                                <div class="flex justify-end gap-3 pt-3">
                                    <button onClick={() => setShowPromptModal(false)} class="px-5 py-2 border rounded text-sm hover:bg-gray-100 font-medium transition">Đóng</button>
                                    <button onClick={handleCopyPrompt} class="px-5 py-2 bg-indigo-600 text-white rounded font-bold text-sm shadow-md hover:bg-indigo-700 transition">
                                        {copySuccess ? "✔ Đã Copy!" : "Copy Prompt"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
